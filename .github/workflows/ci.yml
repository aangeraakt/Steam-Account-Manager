name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build release
        run: cargo build --release

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: steam-account-manager-linux
          path: target/release/steam-account-manager
          if-no-files-found: error

  release:
    name: Build & publish release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "cargo_version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build release
        run: cargo build --release --verbose

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: steam-account-manager-linux
          path: artifacts/linux

      - name: Prepare release assets
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.cargo_version }}"
          $winAsset = "Steam-Account-Manager-$version-windows.exe"
          $linuxAsset = "Steam-Account-Manager-$version-linux"
          Copy-Item "target\release\steam-account-manager.exe" $winAsset
          Copy-Item "artifacts\linux\steam-account-manager" $linuxAsset
          echo "WIN_ASSET=$winAsset" >> $env:GITHUB_ENV
          echo "LINUX_ASSET=$linuxAsset" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Steam Account Manager v${{ steps.version.outputs.cargo_version }} (build ${{ github.run_number }})
          body: |
            Automatische release van build ${{ github.run_number }} op `${{ github.sha }}`.

            **Downloads**
            - Windows: `Steam-Account-Manager-${{ steps.version.outputs.cargo_version }}-windows.exe`
            - Linux: `Steam-Account-Manager-${{ steps.version.outputs.cargo_version }}-linux`
          files: |
            ${{ env.WIN_ASSET }}
            ${{ env.LINUX_ASSET }}
